        description:
          type: string
          description: The description of the print format.
        pageType:
          type: string
          description: The specification of the print medium.)
          enum:
            - REGULARPAGE
            - ENVELOPE
            - LABELPRINTER
            - LABELPAGE
        pageLayout:
          $ref: '#/components/schemas/PageLayout'
      description: The representation of a page format.
    PageLayout:
