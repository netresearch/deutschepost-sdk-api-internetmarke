        voucherLayout:
          type: string
          enum:
            - ADDRESS_ZONE
            - FRANKING_ZONE
        positionType:
          type: string
          example: AppShoppingCartPosition
          default: AppShoppingCartPosition
      description: The representation of an order item in PNG format.
    AppShoppingCartPreviewPNGRequest:
      required:
