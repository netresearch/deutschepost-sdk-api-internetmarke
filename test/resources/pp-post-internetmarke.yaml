openapi: 3.0.1
info:
  version: "1.30"
  title: Deutsche Post INTERNETMARKE API
  description: >-
     Division: Post & Parcel Germany<br />
     The INTERNETMARKE is the online-postage for mail products of Deutsche Post AG.
  termsOfService: >-
    https://www.deutschepost.de/de/i/internetmarke-porto-drucken/kundenservice/internetmarke/kontakt.html
  contact:
    name: Deutsche Post / DHL
    url: >-
      https://www.deutschepost.de/de/i/internetmarke-porto-drucken/kundenservice/internetmarke/kontakt.html
  license:
    name: License
    url: https://www.deutschepost.com
servers:
  - url: https://api-eu.dhl.com/post/de/shipping/im/v1
    description: Production environment
tags:
  - name: ApiVersionResource
    description: The REST Api version resource (Healthcheck).
  - name: UserResource
    description: >-
      The rest resource user consists of two blocks of actions:<ul><li> Authorization of DPDHL external clients,</li><li>Retrieve for authorized user the user profile.</li></ul>
  - name: AppResource
    description: >-
      The rest resource app is used to sell the INTERNETMARKE that are generated
      in DP DHL's INTERNETMARKE application. The internet stamp is generated via
      an individual cash account assigned to the end customer.<br/>The app
      resource consists of three blocks of actions:<ul><li> User cash
      management,</li><li> Internet stamps and</li><li> Provision of
      information.</li></ul>
paths:
  /:
    get:
      tags:
        - ApiVersionResource
      summary: Get information about this REST Api version.
      operationId: apiVersion
      description: |
        The call can be used to obtain the current version of the API and to confirm that the API is operational.
        Note that this call does not require authentication, it can also be called via browser.
      responses:
        '200':
          description: Major, minor, and build number being returned as x.y.z
          content:
            application/json:
              schema:
                type: object
                properties:
                  amp:
                    type: object
                    properties:
                      name:
                        type: string
                        example: 'pp-post-internetmarke'
                      version:
                        type: string
                        description: "Sandbox version is >= Prod version"
                        pattern: '^v\d{1,2}.\d{1,2}[.\d{1,5}]$'
                        example: 'v1.1.4'
                      rev:
                        type: string
                        example: '13'
                      env:
                        type: string
                        example: 'prod-eu'
  /app/wallet:
    put:
      tags:
        - AppResource
      summary: Charge users wallet
      operationId: chargeWallet
      parameters:
        - name: amount
          in: query
          description: >-
            The amount (positive integer as EUROCENT) to be charged for users
            wallet.
          required: true
          schema:
            minimum: 1
            type: integer
            format: int32
      responses:
        '200':
          description: OK, users wallet was charged  successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChargeWalletResponse'
        '400':
          description: >-
            Bad request, details about the error are described in the response
            body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400Response'
              examples:
                  quotaExceeded:
                    summary: Quota exceeded
                    value:
                      statusCode: "400"
                      title: "quotaExceeded"
                      detail: "Error while processing charging request for serialnumber 'A00123C039'"
                  forbiddenPaymentMethod:
                    summary: Used payment method is not allowed
                    value:
                      statusCode: "400"
                      title: "forbiddenPaymentMethod"
                      detail: "Error while processing charging request for serialnumber 'A00123C039'"

        '401':
          description: >-
            Unauthorized, user account is not valid, is locked, the provided authorization token is not valid or the application is not authorized by user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error401Response'
        '403':
          description: Forbidden, user has not enough privileges to perform this request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error403Response'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error404Response'
              example:
                statusCode: "404"
                title: "Not Found"
                detail: "Wallet not found for account: ACCOUNT12345"
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error429Response'
        '500':
          description: >-
            Internal Server Error, details about the technical error are
            provided in the response body. Please contact support if the issue persists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error500Response'
      security:
        - BearerAuth: []
  /user:
    post:
      tags:
        - UserResource
      summary: Get authorization token.
      operationId: authorization
      description:  | 
            __This request is the precondition for almost all other calls!__
            
            The call provides you with the Bearer token which is then used for all other calls.
            
            Here is how:
            The client makes a POST request to the 'user' resource by adding the following parameters 
            using the application/x-www-form-urlencoded format with a character
            encoding of UTF-8 in the HTTP request body:
            
            * grant_type __REQUIRED__. Must be set to "client_credentials".
            
            * client_id __REQUIRED__ (aka client_id (api key)  -- obtained in DHL Developer Portal)
            
            * client_secret __REQUIRED__ (aka client_secret -- obtained in DHL Developer Portal)
            
            * username __REQUIRED__. 

            * password __REQUIRED__. (Max length is 22 chars) 
            
            The internetmarke credentials (username, password) for production access will be provided during onboarding, along with additional information. For sandbox access, suitable default values exist. See the remainder of the documentation.

      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                  enum: [client_credentials]
                  description: OAuth2 standard content, must be set to 'client_credentials'
                username:
                  type: string
                  example: franz.klammer@mydomain.com
                  description: Internetmarke user name (e.g. 'franz.klammer@mydomain.com').
                password:
                  type: string
                  example: abfahrt123#
                  description: Internetmarke password (e.g. 'abfahrt123#'). Max length is 22 chars.
                client_id:
                  type: string
                  example: XjSnyVWgQp1ShIQ5HQ6Vq5PIYLN2jGNS
                  description: API client_id obtained from developer portal (e.g. 'XjSnyVWgQp1ShIQ5HQ6Vq5PIYLN2jGNS')
                client_secret:
                  type: string
                  example: TICgJWGRysH7mA57
                  description: API client_secret obtained from developer portal (e.g. 'TICgJWGRysH7mA57')
              required:
                - grant_type
                - client_id
                - client_secret
                - username
                - password
      responses:
        '200':
          description: OK, user is successfully authorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Authentication200Response'
        '400':
          description: >-
            Bad request, details about the error are described in the response
            body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400Response'
        '401':
          description: >-
            Unauthorized, user account is not valid, is locked, the provided authorization token is not valid or the application is not authorized by user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error401Response'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error429Response'
        '500':
          description: >-
            Internal Server Error, details about the technical error are
            provided in the response body. Please contact support if the issue persists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error500Response'
  /app/shoppingcart:
    post:
      tags:
        - AppResource
      summary: Initializes a shopping cart and returns the shopOrderId.
      operationId: initShoppingCartApp
      responses:
        '200':
          description: OK, shopping cart initialization was successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitShoppingCartResponse'
        '400':
          description: >-
            Bad request, details about the error are described in the response
            body, i.e. shopping cart pdf isn't finalized right now.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400Response'
              examples:
                invalidProductcode:
                  summary: The given product code is invalid
                  value:
                    statusCode: "400"
                    title: "invalidProductcode"
                    detail: "The productcode is invalid! Reason: No product with productcode: 9999 found!"
                invalidShopOrderID:
                  summary: The given shopOrderId is invalid
                  value:
                    statusCode: "400"
                    title: "invalidShopOrderID"
                    detail: "Queued order duplicated for the shopOrderId '123123'"
        '401':
          description: >-
            Unauthorized, user account is not valid, is locked, the provided authorization token is not valid or the application is not authorized by user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error401Response'
        '403':
          description: Forbidden, user has not enough privileges to perform this request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error403Response'
        '404':
          description: Not found, the specified shopOrderId could not be found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error404Response'
              example:
                statusCode: "404"
                title: "Not Found"
                detail: "Order not found: ORDERID12345"
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error429Response'
        '500':
          description: >-
            Internal Server Error, details about the technical error are
            provided in the response body. Please contact support if the issue persists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error500Response'
      security:
        - BearerAuth: []
  /app/shoppingcart/png:
    post:
      tags:
        - AppResource
      summary: Checkouts the PNG shopping cart. Be aware of the different types of schemas for checkout OR preview within the request. Preview does not need addresses. The print format is not relevant at this point.
      operationId: checkoutShoppingCartPNGApp
      parameters:
        - name: validate
          in: query
          description: >-
            The response will contain the link to a thumbnail image of an
            Internet brand in PNG format, which the third-party application must
            integrate accordingly. The print format is not relevant at this
            point. The service is given a product code, optionally a motif and a
            layout format. This information is encoded in the link and evaluated
            by INTERNETMARKE when the preview image is rendered. If the product
            code or theme ID is invalid, the response to the caller will contain
            appropriate information.
          required: false
          schema:
            type: boolean
            default: false
        - name: directCheckout
          in: query
          description: >-
            This request parameter enables the direct checkout of the
            shopping cart and an extra checkout request is not required.
          required: false
          schema:
            type: boolean
            default: false
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/AppShoppingCartPNGRequest'
                - $ref: '#/components/schemas/AppShoppingCartPreviewPNGRequest'
        required: true
      responses:
        '200':
          description: >-
            OK, create and checkout shopping cart PNG was successfully.
            Due to the request for checkout, the response will contain the link to a internet stamp in PNG format. 
            Appropriate print formats are relevant. For the given product code, voucherLayout format and optionally a motif, 
            the INTERNETMARKE pdf is rendered and the link provided.  
            In case of preview the response will contain the link to a preview pdf of an internet stamp in PNG format. 
            Addresses are not part of the preview request.
            If the product code or theme ID is invalid, the response to the caller will contain appropriate information.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutShoppingCartApp200Response'
        '400':
          description: >-
            Bad request, details about the error are described in the response
            body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400Response'
              examples:
                invalidProductcode:
                  summary: The given product code is invalid
                  value:
                    statusCode: "400"
                    title: "invalidProductcode"
                    detail: "The productcode is invalid! Reason: No product with productcode: 9999 found!"
                invalidShopOrderID:
                  summary: The given shopOrderId is invalid
                  value:
                    statusCode: "400"
                    title: "invalidShopOrderID"
                    detail: "Queued order duplicated for the shopOrderId '123123'"
        '401':
          description: >-
            Unauthorized, user account is not valid, is locked, the provided authorization token is not valid or the application is not authorized by user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error401Response'
        '403':
          description: Forbidden, user has not enough privileges to perform this request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error403Response'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error429Response'
        '500':
          description: >-
            Internal Server Error, details about the technical error are
            provided in the response body. Please contact support if the issue persists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error500Response'
      security:
        - BearerAuth: []
  /app/shoppingcart/pdf:
    post:
      tags:
        - AppResource
      summary: Checkouts the PDF shopping cart. Be aware of the different types of schemas for checkout OR preview within the request. Preview does not need addresses.
      operationId: checkoutShoppingCartPDFApp
      parameters:
        - name: validate
          in: query
          description: >-
            This request parameter enables the validate (preview) case.<br/>The
            response will contain the link to a preview image of an internet
            stamp in PDF format. A product code, a layout format and optionally
            a motif are transferred to the service. This information is encoded
            in the link and evaluated by INTERNETMARKE when the preview image is
            rendered. If the product code, print format, or theme ID is invalid,
            the response to the caller will contain appropriate information.  
            <br/><br/> For the validate (preview) case the request body has to be of the
            specified type (See
            `#/components/schemas/AppShoppingCartPreviewPDFRequest`).
          required: false
          schema:
            type: boolean
            default: false
        - name: directCheckout
          in: query
          description: 'This request parameter enables the direct checkout of the
            shopping cart and an addition request for the checkout is not required.'
          required: false
          schema:
            type: boolean
            default: false
      requestBody:
        content:
          application/json:
            schema:
              description: >-
                The request body structure can be of different types. The type
                of the request has to be provided by specifying the filed 'type'
                of the body.
              oneOf:
                - $ref: '#/components/schemas/AppShoppingCartPDFRequest'
                - $ref: '#/components/schemas/AppShoppingCartPreviewPDFRequest'
        required: true
      responses:
        '200':
          description: >- 
            OK, create and checkout shopping cart PDF was successfully.
            Due to the request for checkout, the response will contain the link to a internet stamp in PDF format.
            Appropriate print formats are relevant. For the given product code, voucherLayout format and optionally a motif,
            the INTERNETMARKE pdf is rendered and the link provided.
            In case of preview the response will contain the link to a preview pdf of an internet stamp in PNG format.
            Addresses are not part of the preview request.
            If the product code or theme ID is invalid, the response to the caller will contain appropriate information.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutShoppingCartApp200Response'
        '400':
          description: >-
            Bad request, details about the error are described in the response
            body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400Response'
        '401':
          description: >-
            Unauthorized, user account is not valid, is locked, the provided authorization token is not valid or the application is not authorized by user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error401Response'
        '403':
          description: Forbidden, user has not enough privileges to perform this request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error403Response'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error429Response'
        '500':
          description: >-
            Internal Server Error, details about the technical error are
            provided in the response body. Please contact support if the issue persists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error500Response'
      security:
        - BearerAuth: []
  /app/retoure:
    get:
      tags:
        - AppResource
      summary: Retrieve retoure state for ordered items corresponding to shopRetoureId or retoureTransactionId
      operationId: retrieveRetoureStateApp
      parameters:
        - name: shopRetoureId
          in: query
          description: The shopRetoureId was returned from the retoure Vouchers request.
          required: false
          schema:
            type: string
        - name: retoureTransactionId
          in: query
          description: >-
            Internal transaction number under which the refund was booked in the
            PCF.
          required: false
          schema:
            type: integer
            format: int32
        - name: startDate
          in: query
          description: >-
            The start date of the search. Expected format:
            yyyy-MM-dd'T'HH:mm:ss.SSSXXX.
          required: false
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          description: >-
            The end date of the search. Expected format:
            yyyy-MM-dd'T'HH:mm:ss.SSSXXX.
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: OK, retoure state found successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetrieveRetoureStateResponse'
        '400':
          description: >-
            Bad request, details about the error are described in the response
            body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400Response'
              example:
                statusCode: "400"
                title: "unknownShopOrderId"
                detail: "Queued order duplicated for the shopOrderId '123123'"
        '401':
          description: Unauthorized, user account is not valid, is locked, the provided authorization token is not valid or the application is not authorized by user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error401Response'
        '403':
          description: Forbidden, user has not enough privileges to perform this request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error403Response'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error429Response'
        '500':
          description: >-
            Internal Server Error, details about the technical error are
            provided in the response body. Please contact support if the issue persists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error500Response'
      security:
        - BearerAuth: []
    post:
      tags:
        - AppResource
      summary: Request retoure for ordered items corresponding to all items for shopOrderId or items with specific voucherId or trackId
      operationId: retoureVouchersApp
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetoureVouchersRequest'
        required: true
      responses:
        '200':
          description: OK, retoure vouchers processed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetoureVouchersResponse'
        '400':
          description: >-
