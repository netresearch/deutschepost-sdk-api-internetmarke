          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400Response'
        '401':
          description: Unauthorized, user account is not valid, is locked, the provided authorization token is not valid or the application is not authorized by user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error401Response'
        '403':
          description: Forbidden, user has not enough privileges to perform this request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error403Response'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error429Response'
        '500':
          description: >-
            Internal Server Error, details about the technical error are
            provided in the response body. Please contact support if the issue persists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error500Response'
      security:
        - BearerAuth: []
  /user/profile:
    get:
      tags:
        - UserResource
      summary: Retrieve profile data of authorized user for shop.
      operationId: retrieveUserData
      description:  | 
            The client retrieves certain settings about his user profile.

      responses:
        '200':
          description: >-
            OK, user is successfully authorized and the user data returned
            within the response body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetrieveUserDataResponse'
        '400':
          description: >-
            Bad request, details about the error are described in the response
            body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400Response'
        '401':
          description: Unauthorized, user account is not valid, is locked, the provided authorization token is not valid or the application is not authorized by user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error401Response'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error429Response'
        '500':
          description: >-
            Internal Server Error, details about the technical error are
            provided in the response body. Please contact support if the issue persists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error500Response'
      security:
        - BearerAuth: []
  /app/shoppingcart/{shopOrderId}:
    get:
      tags:
        - AppResource
      summary: Retrieves a shopping cart.
      operationId: retrieveShoppingCartApp
      parameters:
        - name: shopOrderId
          in: path
          description: >-
            The shopOrderId was responsed within the response body of the
            checkout operation.
          required: true
          schema:
            maxLength: 18
            minLength: 1
            type: string
      responses:
        '200':
          description: OK, retrieve shopping cart pdf was successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutShoppingCartAppResponse'
              example:
                type: "CheckoutShoppingCartAppResponse"
                link: "https://pcf-next.tcb.deutschepost.de/PcfExtensionWeb/document?keyphase=3&data=GpyUVLv5OfMWrV0KlUyeqIusHgvB9sO7BZ5Sh9m%2FZnI%3D"
                manifestLink: ""
                shoppingCart:
                  shopOrderId: "98276337"
                  voucherList:
                    - voucherId: "A00123C0390000000138"
                      trackId: ""
                walletBallance: 42355
        '400':
          description: >-
            Bad request, details about the error are described in the response
            body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400Response'
              example:
                statusCode: "400"
                title: "invalidShopOrderID"
                detail: "Queued order duplicated for the shopOrderId '123123'"
        '401':
          description: >-
            Unauthorized, user account is not valid, is locked, the provided authorization token is not valid or the application is not authorized by user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error401Response'
        '403':
          description: Forbidden, user has not enough privileges to perform this request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error403Response'
        '404':
          description: Not found, the specified shopOrderId could not be found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error404Response'
              example:
                statusCode: "404"
                title: "Not Found"
                detail: "Order not found: ORDERID12345"
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error429Response'
        '500':
          description: >-
            Internal Server Error, details about the technical error are
            provided in the response body. Please contact support if the issue persists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error500Response'
      security:
        - BearerAuth: []
  /app/catalog:
    get:
      tags:
        - AppResource
      summary: Retrieve catalogs.
      operationId: retrieveCatalogApp
      parameters:
        - name: types
          in: query
          description: >-
            The type of the required catalog, can be specified as single or
            multiple. Only specified types will be returned.
          required: true
          schema:
            type: array
            items:
              type: string
              enum:
                - PUBLIC
                - PAGE_FORMATS
      responses:
        '200':
          description: OK, specified catalog content was found successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetrieveCatalogResponse'
        '400':
          description: >-
            Bad request, details about the error are described in the response
            body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400Response'
        '401':
          description: >-
            Unauthorized, user account is not valid, is locked, the provided authorization token is not valid or the application is not authorized by user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error401Response'
        '403':
          description: Forbidden, user has not enough privileges to perform this request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error403Response'
        '404':
          description: Not found, the specified catalog could not be found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error404Response'
              example:
                statusCode: "404"
                title: "Not Found"
                detail: "Catalog not found: CATALOG12345"
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error429Response'
        '500':
          description: >-
            Internal Server Error, details about the technical error are
            provided in the response body. Please contact support if the issue persists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error500Response'
      security:
        - BearerAuth: []
components:
  schemas:
    RequestStatus:
      required:
        - statusCode
        - title
        - detail
      type: object
      properties:
        statusCode:
          type: string
          description: The http status code.
        title:
          type: string
          description: The title of the error.
        detail:
          type: string
          description: The detailed description about the error.
      description: The response details in case of errors.
      example:
        statusCode: "400"
        title: "Bad Request"
        detail: "Required request header 'Authorization' for method parameter type String is not present"
    ChargeWalletResponse:
      required:
        - shopOrderId
      type: object
      properties:
        shopOrderId:
          maxLength: 18
          minLength: 1
          type: string
          description: >-
            The order number in the shop. All characters are allowed except <
            and &.
        walletBalance:
          type: integer
          description: The new balance.
          format: int32
      description: The response object for the charge wallet operation.
    Error403Response:
      description: The response object for 403 Forbidden errors.
      allOf:
        - $ref: '#/components/schemas/RequestStatus'
      example:
        statusCode: "403"
        title: "Forbidden"
        detail: 'Forbidden, user has not enough privileges to perform this request.'
    Error404Response:
      description: The response object for 404 Not Found errors.
      allOf:
        - $ref: '#/components/schemas/RequestStatus'
      example:
        statusCode: "404"
        title: "Not found"
        detail: 'Catalog not found: CATALOG12345'
    Error429Response:
      description: The response object for 429 Too Many Requests errors.
      allOf:
        - $ref: '#/components/schemas/RequestStatus'
      example:
        statusCode: "429"
        title: "Too Many Requests"
        detail: 'Too many requests sent, please try again later.)'
    Error400Response:
      description: The response object for 400 Bad Request errors. Check the detail field for more information.
      allOf:
        - $ref: '#/components/schemas/RequestStatus'
      example:
        statusCode: "400"
        title: "Bad Request"
        detail: "Required request header 'Authorization' for method parameter type String is not present"
    Error401Response:
      description: The response object for 401 Unauthorized errors.
      allOf:
        - $ref: '#/components/schemas/RequestStatus'
      example:
        statusCode: "401"
        title: "Unauthorized"
        detail: 'Unauthorized, user account is not valid, is locked, the provided authorization token is not valid or the application is not authorized by user.'
    Error500Response:
      description: Internal Server Error, details about the technical error are
        provided in the response body. Please contact support if the issue persists.
      allOf:
        - $ref: '#/components/schemas/RequestStatus'
      example:
        statusCode: "500"
        title: "Internal Server Error"
        detail: "Internal Server Error, details about the technical error are
            provided in the response body. Please contact support if the issue persists."
    Authentication200Response:
      description: The response object for user authentication.
      type: object
      properties:
        access_token:
          type: string
          description: The access token / bearer token. (user_token is deprecated)
        walletBalance:
          type: integer
          description: money balance in portokasse
        infoMessage:
          type: string
          description: info message, if any
        tokenType:
          type: string
          description: Will always contain 'BearerToken'
        expires_in:
          type: integer
          description: remaining token validity in seconds
        issued_at:
          type: string
          pattern: '^[A-Za-z]{3}, \d{2} [A-Za-z]{3} \d{4} \d{2}:\d{2}:\d{2} GMT$'
          description: Time when token was issued
        external_customer_id:
          type: string
          description: Matches the user requesting the token, used internally
        authenticated_user:
          type: string
          description: user requesting the token
      example:
                access_token: BnN6L2SeyMjKcIMGhgaaUO6GNAIMBtdqmG7klJKbcIo=
                walletBalance: 2446814
                infoMessage: ''
                token_type: BearerToken
                expires_in: 3000
                issued_at: Wed, 03 Apr 2024 08:37:17 GMT
                external_customer_id: DHL-0123
                authenticated_user: max.mustermann@deutschepost.de
    InitShoppingCartResponse:
      required:
        - shopOrderId
      type: object
      properties:
        shopOrderId:
          maxLength: 18
          minLength: 1
          type: string
          description: >-
            The order number in the shop. All characters are allowed except <
            and &.
      description: The response object for creating the shopOrderId..
    Address:
      description: The address information used for sender and receiver.
      required:
        - addressLine1
        - city
        - country
        - name
        - postalCode
      type: object
      properties:
        name:
          maxLength: 50
          minLength: 1
          type: string
          description: The name information (firstname lastname)
          example: Max Mustermann
        additionalName:
          maxLength: 40
          minLength: 0
          type: string
          description: The additional name information (i. e. company name)
          example: Deutsche Post AG
        addressLine1:
          maxLength: 50
          minLength: 1
          type: string
          description: >-
            This is the first line of the address. Usually street name and house
            number.
        addressLine2:
          maxLength: 60
          minLength: 1
          type: string
          description: >-
            Line 2 of the street address. Most of the time this is not needed
            and not printed to most labels.
          example: 3rd Floor
        postalCode:
          maxLength: 5
          minLength: 5
          type: string
          description: The zip code.
          example: '10115'
        city:
          maxLength: 40
          minLength: 1
          type: string
          description: The name of the city.
          example: Berlin
        country:
          maxLength: 3
          minLength: 3
          type: string
          description: The iso 3 code of the country.
          example: DEU
    AddressBinding:
      required:
        - receiver
        - sender
      type: object
      properties:
        sender:
          $ref: '#/components/schemas/Address'
        receiver:
          $ref: '#/components/schemas/Address'
      description: The combination of sender and receiver address.
    VoucherPosition:
      type: object
      properties:
        labelX:
          type: integer
          description: The x-position of the label.
          format: int32
        labelY:
          type: integer
          description: The y-position of the label.
          format: int32
        page:
          type: integer
          description: The target page in the printout.
          format: int32
      description: >-
        The position coordinates of the order item. It is mandatory required for
        the PDF format. Values >0 are mandatory.
    Voucher:
      required:
        - voucherId
      type: object
      properties:
        voucherId:
          type: string
          description: The voucher ID.
        trackId:
          type: string
          description: The tracking ID.
      description: The voucher encapsulates the voucher ID and the tracking ID.
    RetoureVouchersResponse:
      required:
        - retoureTransactionId
        - shopRetoureId
      type: object
      properties:
        shopRetoureId:
          maxLength: 18
          minLength: 1
          type: string
          description: The shop return ID.
        retoureTransactionId:
          type: string
          description: >-
            The internal transaction number under which the refund was booked in
            the system.
      description: The response object for refund.
    RetoureVouchersRequest:
      required:
        - shoppingCart
      type: object
      properties:
        shoppingCart:
          $ref: '#/components/schemas/ShoppingCart'
      description: The request object for refund.
    ShoppingCart:
      type: object
      properties:
        shopOrderId:
          maxLength: 18
          minLength: 1
          type: string
          description: >-
            The order number in the shop. All characters are allowed except <
            and &.
        voucherList:
          maxItems: 2147483647
          minItems: 1
          type: array
          description: The list of created franking IDs.
          items:
            $ref: '#/components/schemas/Voucher'
      description: >-
        The structural element for describing the shopping cart and the
        generated matrix code(s).
    CheckoutShoppingCartApp200Response:
          $ref: '#/components/schemas/CheckoutShoppingCartAppResponse'
    AppCheckoutPNGRequest:
      description: >-
        The base request object for external partners to get an internet stamp
        in PNG format.
      required:
        - type
      type: object
      properties:
        type:
          type: string
          enum:
            - AppShoppingCartPNGRequest
            - AppShoppingCartPreviewPNGRequest
          example: AppShoppingCartPNGRequest
          default: AppShoppingCartPNGRequest
          description: >- 
            set AppShoppingCartPNGRequest if validate=false, AppShoppingCartPreviewPNGRequest if validate=true
      discriminator:
        propertyName: type
    AppShoppingCartPDFPosition:
      required:
        - position
        - positionType
        - productCode
        - voucherLayout
      type: object
      description: The representation of an order item in PDF format.
      discriminator:
        propertyName: positionType
      allOf:
        - $ref: '#/components/schemas/AppShoppingCartPosition'
        - type: object
          properties:
            position:
              $ref: '#/components/schemas/VoucherPosition'
            positionType:
              type: string
              example: AppShoppingCartPDFPosition
    AppShoppingCartPNGRequest:
      required:
        - positions
        - type
      type: object
      description: >-
        The request object for external partners to buy an internet stamp in PNG
        format.
      discriminator:
        propertyName: type
      allOf:
        - $ref: '#/components/schemas/AppCheckoutPNGRequest'
        - type: object
          properties:
            shopOrderId:
              maxLength: 18
              minLength: 1
              type: string
              description: >-
                The order number in the shop. All characters are allowed except
                < and &. It is optional in case of query parameter directCheckout is
                true. In all other cases it is mandatory required.
            total:
              type: integer
              description: Total value of the shopping cart in euro cents.
              format: int32
            createManifest:
              type: boolean
              description: The flag indicating whether a posting receipt should be created.
            createShippingList:
              type: string
              enum: [ "0","1","2" ]
              description: >-
                Identifier of which type of shipping list is to be created:
                0: No shipping list
                1: Shipping list without addresses / delivery receipt only
                2: Shipping list with addresses
            dpi:
              type: string
              enum:
                - DPI300
                - DPI203
            optimizePNG:
              type: boolean
              description: The flag to optimize the PNG (avoid redundant area height).
            positions:
              type: array
              description: List of PNG order items. At least one item has to be specified.
              items:
                $ref: '#/components/schemas/AppShoppingCartPosition'
            type:
              type: string
          required:
            - total

    AppShoppingCartPosition:
      required:
        - positionType
        - productCode
        - voucherLayout
      type: object
      properties:
        productCode:
          minimum: 1
          type: integer
          description: >-
            The product code for the selected product, e.g. standard
            letter, maxi letter etc. The product code can be derived from ProdWS integration or directly taken from the downloadable product price lists (PPLs). The product code must be greater than 0 and
            the product must be available in the third-party application.
